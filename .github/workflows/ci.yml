name: NodeJS with Grunt

env:
  CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
  RUN_ID: ${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }} # unique ID for every single workflow execution

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # When the workflow is triggered in a forked PR, which is a condition where parallelization isn't enabled (as CYPRESS_RECORD_KEY is only accessible in the main repository),
        # fall back to a single container to avoid running tests twice.
        containers: >-
          ${{ github.event_name == 'pull_request' && (github.event.pull_request.head.repo.full_name != github.repository) &&
          fromJSON('[1]') || fromJSON('[1, 2, 3]') }}
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'
    - run: npm ci
    - run: npm test
